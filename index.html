<!DOCTYPE html>
<html lang="it">
    <head>
        
        <meta charset="UTF-8" />
        <meta name="viewport"  content="width=device-width,
        initial-scale=1.0"> 
             <title>Calcolatrice</title>
 
           <link rel="stylesheet" href="style-index.css"> <!-- Il file CSS -->  
    
     </head>
    
      
       <body>
        
              

        <div class="container">
        
        <h1>Calcolatrice</h1>
        <p id="primo">Primo valore</p>
         <input type="number" id="inp1" value="">
        <p id="op">operatore</p>
         <input type="text" id="oper" maxlength="1">
        
        <p id="secondo">Secondo valore</p>
         <input type="number"  id="inp2" value=""> 
          <p id="ugua">uguale</p>
         <button  type="button"  id="uguale"  onclick="calcola()"></button>
         <p id="operatori1">addizione (a) sottrazione (s) moltiplicazione (m)</p>        
         <p id="operatori2">divisione (d) radice (r) cancellazione (c)</p>              
         <input type="text" id="data" value="" readonly>
                
        
         </div>      
             
       <script>
     

            let data= new Date(); 
             document.getElementById('data').value = (data) ; 
                 
               function calcola(){

              const oper  =  document.getElementById('oper').value;  
              
              if (oper === "c"  || oper === "C") {
                 
                 document.getElementById('inp1').value = ""; 
                  document.getElementById('inp2').value = "";
                  document.getElementById('oper').value = "";
                  
              }
                                      
            const numero1 = document.getElementById('inp1').value;
             const primo = +numero1;
            
             if(primo <1) return
                 
                   
           if(oper === "R" || oper === "r" ){          
       
            let radice =0;
            let	conta=0;          

	       do{	
             conta=conta+1;
              radice =conta*conta; 
              
	          }while( radice < primo);  
               if (radice  === primo) {
           document.getElementById('inp1').value = (conta); 
           document.getElementById('oper').value = "";                  
                return
              }                 

                 conta=conta-1;
          do{	 
                
              	conta = conta+0.00000001;
              	radice =conta*conta;    	
            	}while ( radice<primo);

              document.getElementById('inp1').value = (conta);                 
              document.getElementById('oper').value = ""; 
                return
          }
       
           const numero2 =document.getElementById("inp2").value;            
           const secondo = +numero2
           if(secondo <1) return
                 
          
           if(oper  === "a"  || oper === "A") risultato = primo + secondo;
           if (oper === "s"  || oper === "S") risultato = primo-secondo;
           if (oper === "d"  || oper === "D") risultato = primo/ secondo;
           if (oper === "m"  || oper === "M") risultato = primo*secondo;
          
           document.getElementById('inp1').value = (risultato); 
           document.getElementById('oper').value = ""; 
           document.getElementById('inp2').value = "";         
           
      }                        
        
 </script>  
  
 </body>      
           
 </html>
