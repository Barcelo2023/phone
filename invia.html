     <div id="container">
     <h2>Invia messaggio</h2>
     <form action="ricevi.html"  method="get">
     <label for="date"  id="lab" >Data:</label> 
     <input type="text" id="data"  name="data" readonly>
     <label for="name"  id="lab">Nome:</label>
     <input type="text" name="name" id="name"  required  autocomplete="off">
    
      <label for="message" id="labmsg" >Messaggio:</label>
       <textarea  name="message" id="message" rows="5"  cols="40"  required></textarea>
      
      <button onclick="cripta()" type="submit" >Send</button>
      </form>
    </div>
           
    <script>

           let stringaAscii = "";
           let stringaConverti = "";
           let conta = 0;
            let testoMessage ="";
            let lunghezza = 0;
            let converti =0;
            let ascii = "";          
            let pari=0;
            let lettera = "";
            let giorno;
            let fgiorno;
            let mese;
           let Fmese;
            let anno;
            let ora ; 
           let fora;
            let data ;
            let minuti;
            let numero;
            

                   data = new Date(); 
                   giorno = data.getDate();
                   fgiorno = data.getDate();
                   mese =   data.getMonth() + 1;
                   fmese =   data.getMonth() + 1;
                   anno =   data.getFullYear(); 
                   ora  =   data.getHours(); 
                   fora  =   data.getHours(); 
                   minuti = data.getMinutes();
        

                   if(giorno < 10) fgiorno = String(giorno).padStart(2, '0');

                   if(mese   < 10)   fmese   = String(mese).padStart(2, '0');
                
                   if(ora    < 10)   fora = String(ora).padStart(2, '0');
                               
                   let dataFormattata = `${fgiorno}${fmese}${anno}${fora}`;                                 
               
                  document.getElementById('data').value = (data) ; 
                
                
                               
             do{	 
               	stringaAscii +=  String.fromCharCode(conta);                   
                 conta++;                 	
              	}while ( conta < 255); 

                  
                 function cripta() {
                 numero = 0;
                 numero = numero +mese +ora;
                 nome = document.getElementById("name").value;
                 lunghezza = nome.length;

                 for (conta=0; conta <lunghezza; conta ++)
	               {		
                 lettera = nome[conta] ;  	     		 
                 converti = lettera.charCodeAt(0);
	  	            pari = conta;	  	  	  	  

                 if (pari %2 == 0) {  
         
                 converti=converti + numero;
                                               
                 }
                 else{     
                 converti = converti - numero;
                 
                }
                  numero= numero -1;
                  ascii = String.fromCharCode(converti) ; 	
		              stringaConverti+= ascii;            
               
                } 
              
                document.getElementById("name").value = stringaConverti;
                stringaConverti= "";
                  
                 numero = 0;
                 numero = numero +mese +ora;
                 
                 testoMessage = document.getElementById("message").value;
                 lunghezza = testoMessage.length;          

                 for (conta=0; conta <lunghezza; conta ++)
	               {		
                 lettera = testoMessage[conta] ;  	     		 
                 converti = lettera.charCodeAt(0);
                
	  	           pari = conta;	  	  	  	  

               if (pari %2 == 0) {  
               converti=converti -numero;
               
                }
                else{     
                converti = converti +numero; 
                
               }
               numero = numero  -1;
               ascii = String.fromCharCode(converti) ; 	
		           stringaConverti+= ascii;            

          } 
          
                document.getElementById("message").value = stringaConverti;
                document.getElementById('data').value = (dataFormattata) ; 

          
        }              
          
        
    </script>
